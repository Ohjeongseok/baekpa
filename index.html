<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>백파(Baekpa) — 해상 전문 법률 정보 플랫폼</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        :root{--navy:#101D33;--blue:#2B4C7E;--lb:#E2E8F0;--white:#fff;--dark:#1A202C;--gray:#718096;--lgray:#F8FAFC;--border:#CBD5E0;--sidebar:240px}
        body{font-family:'Noto Sans KR',sans-serif;background:#F1F5F9;color:var(--dark);display:flex;height:100vh;overflow:hidden}
        
        /* Sidebar & Layout */
        .sidebar{width:var(--sidebar);background:var(--navy);display:flex;flex-direction:column;flex-shrink:0;height:100vh;overflow-y:auto;border-right:1px solid rgba(255,255,255,0.05)}
        .sb-logo{padding:24px 20px 20px;border-bottom:1px solid rgba(255,255,255,0.08)}
        .sb-logo-main{display:flex;align-items:center;gap:10px}
        .sb-icon{width:32px;height:32px;background:rgba(255,255,255,0.1);border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:18px}
        .sb-name{font-size:18px;font-weight:700;color:#fff;letter-spacing:0.5px}
        .sb-en{font-family:'Inter',sans-serif;font-size:9px;letter-spacing:3px;color:rgba(255,255,255,0.4);margin-top:2px}
        .sb-item{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:4px;cursor:pointer;margin:2px 12px;transition:0.15s;color:rgba(255,255,255,0.65);font-size:13px;font-weight:500}
        .sb-item:hover,.sb-item.active{background:rgba(255,255,255,0.12);color:#fff}
        .sb-item.active{border-left:3px solid var(--blue);padding-left:11px}
        .sb-bottom{margin-top:auto;padding:16px;border-top:1px solid rgba(255,255,255,0.08)}
        
        .main{flex:1;display:flex;flex-direction:column;overflow:hidden}
        .topbar{background:#fff;border-bottom:1px solid var(--border);padding:0 28px;height:60px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
        .content{flex:1;overflow-y:auto;padding:32px 40px}
        .view{display:none}.view.active{display:block}

        /* Expert Cards */
        .expert-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:24px}
        .expert-card{background:#fff;border:1px solid var(--border);border-radius:8px;overflow:hidden;transition:0.2s;display:flex;flex-direction:column}
        .expert-card:hover{transform:translateY(-4px);box-shadow:0 12px 24px rgba(0,0,0,0.1);border-color:var(--navy)}
        .expert-cover{width:100%;height:180px;background:#fff;display:flex;align-items:center;justify-content:center;padding:20px;border-bottom:1px solid var(--lgray)}
        .expert-cover img{max-width:100%;max-height:100%;object-fit:contain}
        .expert-body{padding:24px;flex:1;display:flex;flex-direction:column}
        .expert-role{font-size:12px;color:var(--blue);font-weight:700;margin-bottom:8px;text-transform:uppercase;letter-spacing:0.5px}
        .expert-body h4{font-size:19px;font-weight:700;color:var(--navy);margin-bottom:12px;line-height:1.3}
        .expert-desc{font-size:14px;color:var(--gray);line-height:1.6;margin-bottom:20px;flex:1}
        .expert-btn{width:100%;padding:12px;background:var(--white);border:1px solid var(--navy);color:var(--navy);border-radius:4px;font-weight:700;cursor:pointer;transition:0.2s}
        .expert-btn:hover{background:var(--navy);color:#fff}

        /* Modal Profile */
        .modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:1000;align-items:center;justify-content:center;padding:20px}
        .modal-content{background:#fff;width:100%;max-width:550px;border-radius:12px;overflow:hidden;animation:slideUp 0.3s ease-out}
        @keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
        .modal-body{padding:40px}
        .modal-close{width:100%;padding:16px;background:var(--lgray);border:none;font-weight:700;cursor:pointer;color:var(--gray)}
        
        /* Admin UI */
        #admin-json-input{width:100%;height:300px;padding:16px;border:1px solid var(--border);border-radius:4px;font-family:monospace;margin-bottom:16px}
        .preview-box{width:120px;height:120px;border:2px dashed var(--border);border-radius:4px;display:flex;align-items:center;justify-content:center;margin:10px 0 20px;background:#fff;overflow:hidden}
        .preview-box img{width:100%;height:100%;object-fit:contain}
        
        .toast{position:fixed;bottom:24px;right:24px;background:var(--navy);color:#fff;padding:12px 24px;border-radius:4px;opacity:0;transition:0.3s;z-index:1100}
        .toast.show{opacity:1}
    </style>
</head>
<body>

<aside class="sidebar">
    <div class="sb-logo">
        <div class="sb-logo-main">
            <div class="sb-icon">🛳️</div>
            <div><div class="sb-name">백파</div><div class="sb-en">BAEKPA</div></div>
        </div>
    </div>
    <div class="sb-section" style="padding:20px 16px 8px;font-size:10px;color:rgba(255,255,255,0.3);letter-spacing:2px;">MENU</div>
    <div class="sb-item active" onclick="nav('dashboard')">📊 대시보드</div>
    <div class="sb-item" onclick="nav('search')">📄 판례 데이터</div>
    <div class="sb-item" onclick="nav('experts')">🤝 전문가 네트워크</div>
    <div class="sb-item" id="menu-admin" onclick="nav('admin')" style="display:none;">⚙️ 시스템 관리</div>
    
    <div class="sb-bottom" id="auth-container">
        <button onclick="loginWithGoogle()" style="width:100%;padding:10px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);color:#fff;border-radius:4px;cursor:pointer;">관리자 로그인</button>
    </div>
</aside>

<div class="main">
    <div class="topbar">
        <div style="font-weight:700;color:var(--navy)">Maritime Legal Intelligence</div>
        <div id="user-display" style="font-size:13px;color:var(--gray)"></div>
    </div>
    <div class="content">
        <div class="view active" id="v-dashboard">
            <h2 style="margin-bottom:20px">Overview</h2>
            <div style="background:#fff;padding:40px;border-radius:8px;border:1px solid var(--border);text-align:center;color:var(--gray)">
                대시보드 데이터를 불러오는 중입니다...
            </div>
        </div>

        <div class="view" id="v-search">
            <h2 style="margin-bottom:20px">판례 검색</h2>
            <div id="caseList"></div>
        </div>

        <div class="view" id="v-experts">
            <h2 style="margin-bottom:8px">전문가 네트워크</h2>
            <p style="color:var(--gray);margin-bottom:32px;font-size:14px">해상 분쟁 해결을 위한 최적의 파트너를 확인하세요.</p>
            <div class="expert-grid" id="expertGrid"></div>
        </div>

        <div class="view" id="v-admin">
            <h2 style="margin-bottom:20px">데이터 통합 관리</h2>
            <div style="margin-bottom:20px">
                <select id="admin-upload-type" style="padding:8px;border:1px solid var(--border);border-radius:4px">
                    <option value="case">📄 판례 데이터 (Case)</option>
                    <option value="expert" selected>🤝 전문가 프로필 (Expert)</option>
                </select>
            </div>
            <textarea id="admin-json-input" placeholder='JSON 데이터를 여기에 붙여넣으세요...'></textarea>
            
            <div id="admin-preview-area" style="display:none">
                <p style="font-size:12px;font-weight:700;color:var(--gray)">로고 미리보기:</p>
                <div class="preview-box" id="imgPreview"></div>
            </div>

            <button onclick="uploadJsonToFirebase()" style="padding:14px 28px;background:var(--navy);color:#fff;border:none;border-radius:4px;font-weight:700;cursor:pointer">🚀 데이터베이스 업로드</button>
            <p id="upload-status" style="margin-top:16px;font-weight:600"></p>
        </div>
    </div>
</div>

<div class="modal" id="expertModal" onclick="if(event.target==this)this.style.display='none'">
    <div class="modal-content">
        <div id="modalContent" class="modal-body"></div>
        <button class="modal-close" onclick="document.getElementById('expertModal').style.display='none'">닫기</button>
    </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
    import { getFirestore, collection, getDocs, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDzS9pBTm0MziKUQwD0aB9qa8089DTTMQI",
        authDomain: "baekpa-9234c.firebaseapp.com",
        projectId: "baekpa-9234c",
        storageBucket: "baekpa-9234c.firebasestorage.app",
        messagingSenderId: "857860455109",
        appId: "1:857860455109:web:edf5641153724511e68eac"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    window.EXPERTS = [];
    window.CASES = [];

    // --- Navigation ---
    window.nav = (view) => {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.sb-item').forEach(i => i.classList.remove('active'));
        document.getElementById('v-' + view).classList.add('active');
        const items = document.querySelectorAll('.sb-item');
        if(view === 'dashboard') items[0].classList.add('active');
        if(view === 'search') items[1].classList.add('active');
        if(view === 'experts') { items[2].classList.add('active'); renderExperts(); }
        if(view === 'admin') items[3]?.classList.add('active');
    };

    // --- Expert Logic ---
    function renderExperts() {
        const grid = document.getElementById('expertGrid');
        grid.innerHTML = EXPERTS.map(e => `
            <div class="expert-card">
                <div class="expert-cover">
                    ${e.logoUrl ? `<img src="${e.logoUrl}" alt="Logo">` : '🏢'}
                </div>
                <div class="expert-body">
                    <span class="expert-role">🇰🇷 ${e.country || 'KOREA'} · ${e.role}</span>
                    <h4>${e.name}</h4>
                    <p class="expert-desc">${e.desc || ''}</p>
                    <button class="expert-btn" onclick="openExpertModal('${e.name}')">문의하기 / 프로필 보기</button>
                </div>
            </div>
        `).join('');
    }

    window.openExpertModal = (name) => {
        const e = EXPERTS.find(x => x.name === name);
        if(!e) return;
        document.getElementById('modalContent').innerHTML = `
            <h2 style="color:var(--navy);margin-bottom:8px">${e.name}</h2>
            <p style="color:var(--blue);font-weight:700;margin-bottom:24px">${e.role}</p>
            <div style="font-size:14px;line-height:1.8;color:var(--dark)">
                <p><strong>📍 위치:</strong> ${e.country}</p>
                <p><strong>📧 이메일:</strong> ${e.email || '대표 메일 문의'}</p>
                <p><strong>📞 연락처:</strong> ${e.phone || '홈페이지 참조'}</p>
                <div style="margin-top:20px;padding-top:20px;border-top:1px solid var(--lb)">
                    ${e.desc || '상세 정보가 등록되지 않았습니다.'}
                </div>
            </div>
            <button onclick="location.href='mailto:${e.email || 'admin@baekpa.com'}'" style="width:100%;margin-top:30px;padding:14px;background:var(--navy);color:#fff;border:none;border-radius:4px;font-weight:700;cursor:pointer">📩 지금 바로 이메일 문의하기</button>
        `;
        document.getElementById('expertModal').style.display = 'flex';
    };

    // --- Admin Logic ---
    document.getElementById('admin-json-input').addEventListener('input', (e) => {
        try {
            const data = JSON.parse(e.target.value);
            const preview = document.getElementById('admin-preview-area');
            const imgBox = document.getElementById('imgPreview');
            if(data.logoUrl) {
                preview.style.display = 'block';
                imgBox.innerHTML = `<img src="${data.logoUrl}" onerror="this.innerHTML='❌ Invalid Link'">`;
            } else { preview.style.display = 'none'; }
        } catch(err) {}
    });

    window.uploadJsonToFirebase = async () => {
        const type = document.getElementById('admin-upload-type').value;
        const input = document.getElementById('admin-json-input').value;
        const status = document.getElementById('upload-status');
        try {
            const data = JSON.parse(input);
            const id = (type === 'case' ? data.caseNum : data.name).replace(/\s+/g, '_');
            await setDoc(doc(db, type + 's', id), { ...data, updatedAt: new Date().toISOString() }, { merge: true });
            status.style.color = "#2F855A"; status.innerText = "✅ 성공적으로 업로드되었습니다.";
            document.getElementById('admin-json-input').value = "";
        } catch(e) { status.style.color = "#C53030"; status.innerText = "❌ 실패: " + e.message; }
    };

    // --- Auth & Sync ---
    onAuthStateChanged(auth, (user) => {
        const adminBtn = document.getElementById('menu-admin');
        const authContainer = document.getElementById('auth-container');
        if(user && ["ojs8851@gmail.com", "baekpa0814@gmail.com"].includes(user.email)) {
            adminBtn.style.display = "flex";
            authContainer.innerHTML = `<p style="color:rgba(255,255,255,0.4);font-size:11px;margin-bottom:8px">Logged in as Admin</p><button onclick="signOut(getAuth())" style="width:100%;padding:8px;background:none;border:1px solid rgba(255,255,255,0.2);color:#fff;cursor:pointer">로그아웃</button>`;
        } else {
            adminBtn.style.display = "none";
        }
    });

    window.loginWithGoogle = () => signInWithPopup(auth, provider);

    // 실시간 데이터 동기화
    onSnapshot(collection(db, "experts"), (snap) => {
        EXPERTS = snap.docs.map(d => d.data());
        if(document.getElementById('v-experts').classList.contains('active')) renderExperts();
    });

    onSnapshot(collection(db, "cases"), (snap) => {
        CASES = snap.docs.map(d => d.data());
        document.getElementById('v-dashboard').querySelector('div').innerText = `총 ${CASES.length}건의 판례가 등록되어 있습니다.`;
    });

    window.showToast = (msg) => {
        const t = document.getElementById('toast');
        t.innerText = msg; t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 3000);
    };
</script>
</body>
</html>
