<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>백파(Baekpa) — 해상 전문 법률 정보 플랫폼</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* 기본 스타일 및 변수 */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --navy: #101D33; --blue: #2B4C7E; --lb: #E2E8F0;
            --white: #fff; --dark: #1A202C; --gray: #718096;
            --lgray: #F8FAFC; --border: #CBD5E0; --sidebar: 240px;
        }
        body { font-family: 'Noto Sans KR', sans-serif; background: #F1F5F9; color: var(--dark); display: flex; height: 100vh; overflow: hidden; }

        /* 사이드바 */
        .sidebar { width: var(--sidebar); background: var(--navy); display: flex; flex-direction: column; flex-shrink: 0; height: 100vh; overflow-y: auto; border-right: 1px solid rgba(255,255,255,0.05); }
        .sb-logo { padding: 24px 20px 20px; border-bottom: 1px solid rgba(255,255,255,0.08); }
        .sb-logo-main { display: flex; align-items: center; gap: 10px; }
        
        /* 🌊 백파 로고 원복 스타일 */
        .sb-icon { width: 32px; height: 32px; background: rgba(255,255,255,0.1); border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 18px; color: #fff; }
        .sb-name { font-size: 18px; font-weight: 700; color: #fff; letter-spacing: 0.5px; }
        .sb-en { font-family: 'Inter', sans-serif; font-size: 9px; letter-spacing: 3px; color: rgba(255,255,255,0.4); margin-top: 2px; }

        .sb-item { display: flex; align-items: center; gap: 10px; padding: 10px 14px; border-radius: 4px; cursor: pointer; margin: 2px 12px; transition: all 0.15s; color: rgba(255,255,255,0.65); font-size: 13px; font-weight: 500; }
        .sb-item:hover { background: rgba(255,255,255,0.06); color: #fff; }
        .sb-item.active { background: rgba(255,255,255,0.12); color: #fff; border-left: 3px solid var(--blue); padding-left: 11px; }

        /* 메인 영역 */
        .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .topbar { background: #fff; border-bottom: 1px solid var(--border); padding: 0 28px; height: 60px; display: flex; align-items: center; gap: 16px; flex-shrink: 0; }
        .content { flex: 1; overflow-y: auto; padding: 32px 40px; }
        .view { display: none; }
        .view.active { display: block; }

        /* 🤝 전문가 카드 (모던 레이아웃) */
        .expert-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .expert-card { background: #fff; border: 1px solid var(--border); border-radius: 6px; transition: all 0.2s; display: flex; flex-direction: column; overflow: hidden; }
        .expert-card:hover { border-color: var(--navy); transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0,0,0,0.08); }
        .expert-cover { width: 100%; height: 160px; background: #fff; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: center; padding: 16px; }
        .expert-cover img { width: 100%; height: 100%; object-fit: contain; }
        .expert-body { padding: 20px 24px 24px; flex: 1; display: flex; flex-direction: column; }
        .expert-role { font-size: 11px; color: var(--gray); font-weight: 600; margin-bottom: 8px; display: block; }
        .expert-body h4 { font-size: 18px; font-weight: 700; color: var(--navy); margin-bottom: 12px; }
        .expert-desc { font-size: 13px; color: var(--dark); line-height: 1.6; margin-bottom: 18px; flex: 1; }
        .expert-contact { width: 100%; padding: 12px; background: #fff; color: var(--navy); border: 1px solid var(--navy); border-radius: 4px; font-size: 13px; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .expert-contact:hover { background: var(--navy); color: #fff; }

        /* ⚙️ 관리자 페이지 개선 */
        #admin-json-input { width: 100%; height: 300px; padding: 16px; border: 1px solid var(--border); border-radius: 4px; font-family: monospace; font-size: 13px; margin-bottom: 16px; }
        .img-preview-box { width: 100px; height: 100px; border: 2px dashed var(--border); border-radius: 4px; display: flex; align-items: center; justify-content: center; margin-top: 10px; overflow: hidden; background: #fff; }
        .img-preview-box img { width: 100%; height: 100%; object-fit: contain; }

        /* 공통 UI */
        .toast { position: fixed; bottom: 24px; right: 24px; background: var(--navy); color: #fff; padding: 12px 20px; border-radius: 4px; opacity: 0; transition: 0.3s; z-index: 999; }
        .toast.show { opacity: 1; }
    </style>
</head>
<body>

<aside class="sidebar">
    <div class="sb-logo">
        <div class="sb-logo-main">
            <div class="sb-icon">🛳️</div>
            <div><div class="sb-name">백파</div><div class="sb-en">BAEKPA</div></div>
        </div>
    </div>
    <div class="sb-section">메뉴</div>
    <div class="sb-item active" onclick="nav('dashboard')">📊 대시보드</div>
    <div class="sb-item" onclick="nav('search')">📄 판례 데이터</div>
    <div class="sb-item" onclick="nav('experts')">🤝 전문가 네트워크</div>
    <div class="sb-item" id="menu-admin" onclick="nav('admin')" style="display:none;">⚙️ 시스템 관리</div>
    <div class="sb-bottom" id="auth-container">
        <button class="auth-btn" onclick="loginWithGoogle()" style="width:100%">🔑 관리자 로그인</button>
    </div>
</aside>

<div class="main">
    <div class="topbar">
        <div class="search-wrap">🔍 <input id="mainSearch" type="text" placeholder="검색어 입력..." onkeydown="if(event.key==='Enter')doSearch()"></div>
    </div>
    <div class="content">
        <div class="view active" id="v-dashboard"><h2>대시보드</h2><div id="dashTable"></div></div>
        <div class="view" id="v-search"><h2>판례 검색</h2><div id="searchResults"></div></div>
        <div class="view" id="v-experts">
            <h2>전문가 네트워크</h2>
            <div class="expert-grid" id="expertGrid"></div>
        </div>
        <div class="view" id="v-admin">
            <h2>데이터 통합 관리</h2>
            <div style="margin: 15px 0;">
                <label>업로드 대상: </label>
                <select id="admin-upload-type" class="filter-select">
                    <option value="case">📄 판례 데이터</option>
                    <option value="expert">🤝 전문가 프로필</option>
                </select>
            </div>
            
            <textarea id="admin-json-input" placeholder="JSON 데이터를 입력하세요..."></textarea>
            
            <div id="preview-area" style="margin-bottom: 20px; display: none;">
                <p style="font-size: 12px; color: var(--gray); font-weight: 600;">입력된 로고 미리보기:</p>
                <div class="img-preview-box" id="imgPreview"><span style="color:var(--border)">No Image</span></div>
            </div>

            <button onclick="uploadJsonToFirebase()" style="background:var(--navy); color:#fff; padding:12px 24px; border:none; border-radius:4px; cursor:pointer; font-weight:700;">🚀 데이터베이스 업로드</button>
            <div id="upload-status" style="margin-top:15px; font-weight:600;"></div>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
    import { getFirestore, collection, getDocs, doc, setDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDzS9pBTm0MziKUQwD0aB9qa8089DTTMQI",
        authDomain: "baekpa-9234c.firebaseapp.com",
        projectId: "baekpa-9234c",
        storageBucket: "baekpa-9234c.firebasestorage.app",
        messagingSenderId: "857860455109",
        appId: "1:857860455109:web:edf5641153724511e68eac"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    window.CASES = [];
    window.EXPERTS = [];

    // --- 내비게이션 및 기본 로직 ---
    window.nav = function(view) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById('v-' + view).classList.add('active');
        if(view === 'experts') renderExperts();
    };

    // --- 전문가 렌더링 (모던 카드) ---
    function renderExperts() {
        const container = document.getElementById('expertGrid');
        container.innerHTML = EXPERTS.map(e => `
            <div class="expert-card">
                <div class="expert-cover">
                    ${e.logoUrl ? `<img src="${e.logoUrl}" alt="로고">` : '🏢'}
                </div>
                <div class="expert-body">
                    <span class="expert-role">🇰🇷 ${e.country} · ${e.role}</span>
                    <h4>${e.name}</h4>
                    <div class="expert-desc">${e.desc}</div>
                    <button class="expert-contact" onclick="alert('문의 기능 준비 중입니다.')">문의하기 / 프로필 보기</button>
                </div>
            </div>
        `).join('');
    }

    // --- JSON 입력 시 로고 미리보기 감지 ---
    document.getElementById('admin-json-input').addEventListener('input', (e) => {
        try {
            const data = JSON.parse(e.target.value);
            const previewArea = document.getElementById('preview-area');
            const imgPreview = document.getElementById('imgPreview');
            
            if (data.logoUrl) {
                previewArea.style.display = 'block';
                imgPreview.innerHTML = `<img src="${data.logoUrl}" onerror="this.innerHTML='❌ Invalid Link'">`;
            } else {
                previewArea.style.display = 'none';
            }
        } catch(err) { /* JSON 미완성 시 무시 */ }
    });

    // --- Firebase 연동 ---
    onAuthStateChanged(auth, (user) => {
        const adminMenu = document.getElementById('menu-admin');
        if (user && ["ojs8851@gmail.com", "baekpa0814@gmail.com"].includes(user.email)) {
            adminMenu.style.display = 'flex';
        }
    });

    window.loginWithGoogle = () => signInWithPopup(auth, provider);
    window.uploadJsonToFirebase = async function() {
        const type = document.getElementById('admin-upload-type').value;
        const input = document.getElementById('admin-json-input').value;
        const status = document.getElementById('upload-status');
        
        try {
            const data = JSON.parse(input);
            const id = (type === 'case' ? data.caseNum : data.name).replace(/\s+/g, '_');
            await setDoc(doc(db, type + 's', id), { ...data, updatedAt: new Date().toISOString() }, { merge: true });
            status.innerText = "✅ 업로드 성공!";
            loadData();
        } catch(e) { status.innerText = "❌ 에러: " + e.message; }
    };

    async function loadData() {
        const eSnap = await getDocs(collection(db, "experts"));
        EXPERTS = eSnap.docs.map(d => d.data());
        if(document.getElementById('v-experts').classList.contains('active')) renderExperts();
    }

    loadData();
    window.showToast = (msg) => {
        const t = document.getElementById('toast');
        t.innerText = msg; t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 2500);
    };
</script>
</body>
</html>
